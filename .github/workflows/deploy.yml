name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  schedule:
    # Re-deploy every hour during the tournament (June 11 – July 19 2026)
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API key into HTML
        run: |
          sed -i 's|__ANTHROPIC_API_KEY__|${{ secrets.ANTHROPIC_API_KEY }}|g' index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
