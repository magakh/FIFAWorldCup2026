<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Bracket</title>
<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<style>
img.emoji{height:1.2em;width:1.2em;margin:0 .05em 0 .1em;vertical-align:-0.15em;display:inline}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;font-size:14px}
:root{
  --bg:#fff;--bg2:#f5f5f0;--bg3:#ebebeb;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --border:#e0e0e0;--border2:#bbb;
  --blue-bg:#E6F1FB;--blue-text:#185FA5;--blue-border:#B5D4F4;
  --green-bg:#EAF3DE;--green-text:#3B6D11;--green-border:#C0DD97;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;--amber-border:#FAC775;
  --red-bg:#FCEBEB;--red-text:#A32D2D;--red-border:#F7C1C1;
  --gold:#BA7517;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1e;--bg2:#141414;--bg3:#2a2a2a;
  --text:#f0f0f0;--text2:#aaa;--text3:#555;
  --border:#2e2e2e;--border2:#555;
  --blue-bg:#0C447C;--blue-text:#B5D4F4;--blue-border:#185FA5;
  --green-bg:#27500A;--green-text:#C0DD97;--green-border:#3B6D11;
  --amber-bg:#633806;--amber-text:#FAC775;--amber-border:#854F0B;
  --red-bg:#501313;--red-text:#F09595;--red-border:#A32D2D;
  --gold:#FAC775;
}}

header{background:var(--bg);border-bottom:1px solid var(--border);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo{font-size:17px;font-weight:600}
.hdr-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:6px 13px;border-radius:7px;border:1px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px}
.btn:hover{background:var(--bg3)}
.btn.primary{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue-border)}
.btn.primary:hover{opacity:.85}
.btn.success{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border)}
.btn.danger{background:var(--red-bg);color:var(--red-text);border-color:var(--red-border)}
.btn:disabled{opacity:.5;cursor:default}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);padding:0 18px}
.tab{padding:9px 15px;font-size:13px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue-text);border-bottom-color:var(--blue-text)}
.view{display:none;padding:14px 18px}
.view.active{display:block}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}

#statusBar{font-size:12px;padding:0 18px;display:flex;align-items:center;gap:7px;min-height:0;overflow:hidden;transition:min-height .15s}
#statusBar.info{min-height:38px;background:var(--blue-bg);color:var(--blue-text)}
#statusBar.ok{min-height:38px;background:var(--green-bg);color:var(--green-text)}
#statusBar.err{min-height:38px;background:var(--red-bg);color:var(--red-text)}
.spin{display:inline-block;animation:spin .7s linear infinite;font-size:13px}
@keyframes spin{to{transform:rotate(360deg)}}

#saveIndicator{font-size:11px;color:var(--text3);transition:opacity .4s}

.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
.group-card{background:var(--bg);border:1px solid var(--border);border-radius:11px;overflow:hidden}
.group-header{padding:8px 13px;background:var(--bg3);display:flex;align-items:center;justify-content:space-between}
.group-title{font-size:14px;font-weight:600;color:var(--text)}
.group-meta{font-size:10px;color:var(--text3)}

.standings{width:100%;border-collapse:collapse}
.standings th{font-size:10px;font-weight:600;color:var(--text3);text-align:center;padding:5px 3px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
.standings th.left{text-align:left;padding-left:10px}
.standings td{font-size:11px;text-align:center;padding:5px 3px;border-bottom:1px solid var(--border);color:var(--text2)}
.standings td.left{text-align:left;padding-left:10px}
.standings tr:last-child td{border-bottom:none}
.team-cell{display:flex;align-items:center;gap:6px}
.tf{font-size:14px;flex-shrink:0}
.tn{font-size:11px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
.pos-badge{width:15px;height:15px;border-radius:50%;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pos-1{background:var(--blue-bg);color:var(--blue-text)}
.pos-2{background:var(--green-bg);color:var(--green-text)}
.pos-o{background:var(--bg3);color:var(--text3)}
.pts-cell{font-weight:700;color:var(--text)}
.gd-pos{color:var(--green-text)}
.gd-neg{color:var(--red-text)}
.standings tr.row-1 td{background:var(--blue-bg)}
.standings tr.row-1 .tn{color:var(--blue-text)}
.standings tr.row-2 td{background:var(--green-bg)}
.standings tr.row-2 .tn{color:var(--green-text)}

.matches-section{border-top:1px solid var(--border)}
.matches-list{display:flex;flex-direction:column}
.match-row{display:flex;align-items:center;gap:5px;padding:6px 10px;border-bottom:1px solid var(--border);position:relative}
.match-row:last-child{border-bottom:none}
.match-row.played-row{background:var(--bg2)}
.match-date-col{display:flex;flex-direction:column;align-items:center;min-width:42px;flex-shrink:0}
.match-date{font-size:9px;color:var(--text3);line-height:1.2;text-align:center;white-space:nowrap}
.match-date.upcoming{color:var(--amber-text);font-weight:500}
.match-date.live{color:var(--red-text);font-weight:600}
.match-date.done{color:var(--green-text)}
.mf{font-size:12px;flex-shrink:0}
.mt{font-size:11px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.mt.right{text-align:right}
.score-box{display:flex;align-items:center;gap:3px;flex-shrink:0}
.score-input{width:26px;height:24px;border:1px solid var(--border2);border-radius:4px;text-align:center;font-size:12px;font-weight:700;background:var(--bg);color:var(--text);padding:0;-moz-appearance:textfield}
.score-input::-webkit-inner-spin-button,.score-input::-webkit-outer-spin-button{-webkit-appearance:none}
.score-input:focus{outline:none;border-color:var(--blue-text);background:var(--blue-bg)}
.score-input.auto-filled{background:var(--green-bg);border-color:var(--green-border);color:var(--green-text)}
.score-sep{font-size:10px;color:var(--text3)}
.match-venue{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px}

.group-legend{padding:6px 10px;display:flex;gap:12px;border-top:1px solid var(--border)}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.bracket-wrap{overflow-x:auto;padding-bottom:10px}
.bracket{display:flex;align-items:stretch;min-width:max-content}
.bracket-round{display:flex;flex-direction:column;min-width:148px}
.round-hdr{font-size:10px;font-weight:600;color:var(--text2);text-align:center;padding:6px;text-transform:uppercase;letter-spacing:.05em;background:var(--bg);border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.matches-col{display:flex;flex-direction:column;flex:1}
.match-wrapper{display:flex;flex:1;align-items:center;position:relative}
.match-wrapper::after{content:'';position:absolute;right:-1px;top:50%;width:1px;height:50%;background:var(--border)}
.match-wrapper:last-child::after{display:none}
.match-wrapper.top::after{top:50%;height:50%}
.match-wrapper.bottom::after{top:0;height:50%}
.bmatch{width:136px;margin:4px 7px;border:1px solid var(--border);border-radius:7px;overflow:hidden;background:var(--bg)}
.bs{display:flex;align-items:center;gap:5px;padding:5px 7px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border)}
.bs:last-child{border-bottom:none}
.bs .bf{font-size:12px;width:16px;text-align:center;flex-shrink:0}
.bs .bn{font-size:11px;font-weight:500;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bs .bn.empty{color:var(--text3);font-weight:400;font-style:italic}
.bs.bwin{background:var(--blue-bg)}
.bs.bwin .bn{color:var(--blue-text)}
.bs.bclick:hover{background:var(--bg3)}
.champion-bar{background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:13px 16px;margin-top:12px;display:flex;align-items:center;gap:13px}
.trophy-icon{font-size:26px}
.champ-label{font-size:10px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.champ-name{font-size:19px;font-weight:600;color:var(--gold)}
.champ-empty{font-size:13px;color:var(--text3);font-style:italic}

.tz-wrap{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.tz-wrap select{font-size:11px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);cursor:pointer}

.badge-sg{display:inline-flex;align-items:center;gap:3px;background:var(--amber-bg);color:var(--amber-text);border:1px solid var(--amber-border);border-radius:4px;padding:1px 5px;font-size:10px;font-weight:500;vertical-align:middle}
img.emoji{height:1.2em;width:1.2em;margin:0 .05em 0 .1em;vertical-align:-0.15em;display:inline}
</style>
</head>
<body>

<header>
  <div class="logo">⚽ World Cup 2026</div>
  <div class="hdr-btns">
    <span id="saveIndicator">All changes saved</span>
    <div class="tz-wrap">
      <span>🕐</span>
      <select id="tzSelect" onchange="changeTZ(this.value)"></select>
    </div>
    <button class="btn" onclick="shareLink()" id="shareBtn">🔗 Share</button>
  </div>
</header>

<div id="statusBar"></div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('groups')">Group Stage</div>
  <div class="tab" onclick="switchTab('bracket')">Knockout Bracket</div>
</div>

<div class="view active" id="view-groups">
  <div class="groups-grid" id="groupsGrid"></div>
</div>

<div class="view" id="view-bracket">
  <div class="top-bar">
    <div style="font-size:12px;color:var(--text2)">Click a team to advance them. <span class="badge-sg">⚠ same group</span> = same-group rematch.</div>
    <button class="btn danger" onclick="resetBracket()">↺ Reset bracket picks</button>
  </div>
  <div class="bracket-wrap"><div class="bracket" id="bracketEl"></div></div>
  <div class="champion-bar">
    <div class="trophy-icon">🏆</div>
    <div>
      <div class="champ-label">World Cup Champion 2026</div>
      <div id="champDisplay" class="champ-empty">TBD</div>
    </div>
  </div>
</div>

/* ─── HELPERS ─── */
function getTeam(n){return TEAMS.find(t=>t.name===n)}
function teamFlag(n){const t=getTeam(n);return t?t.flag:""}
function teamGroup(n){const t=getTeam(n);return t?t.group:""}
function groupTeams(g){return TEAMS.filter(t=>t.group===g)}
function groupMatchups(g){
  const s=GROUP_SCHEDULE[g],teams=groupTeams(g);
  return s.map(([hi,ai,utc,stad,city,vtz])=>({home:teams[hi].name,away:teams[ai].name,utcISO:utc,stadium:stad,city,venueTz:vtz}));
}
function fmtDate(utcISO){
  const d=new Date(utcISO);
  const dp=d.toLocaleDateString("en-US",{timeZone:selectedTZ,month:"short",day:"numeric",weekday:"short"});
  const tp=d.toLocaleTimeString("en-US",{timeZone:selectedTZ,hour:"numeric",minute:"2-digit"});
  return dp+"\n"+tp;
}
function matchStatus(utcISO){
  const now=new Date(),mt=new Date(utcISO),diff=(mt-now)/60000;
  if(diff>90) return "upcoming";
  if(diff>-110) return "live";
  return "done";
}

/* ─── TZ SELECTOR ─── */
function initTZSelector(){
  const sel=document.getElementById('tzSelect');
  const auto=Intl.DateTimeFormat().resolvedOptions().timeZone;
  TIMEZONES.forEach(({label,tz})=>{
    const o=document.createElement('option');
    o.value=tz;o.textContent=tz==='auto'?`Auto (${auto})`:label;sel.appendChild(o);
  });
  const saved=localStorage.getItem('wc2026_tz');
  if(saved){sel.value=saved;if(saved!=='auto')selectedTZ=saved;}
  else sel.value='auto';
}
function changeTZ(val){
  if(val==='auto'){selectedTZ=Intl.DateTimeFormat().resolvedOptions().timeZone;localStorage.removeItem('wc2026_tz');}
  else{selectedTZ=val;localStorage.setItem('wc2026_tz',val);}
  buildGroupsUI();
}

/* ─── PERSIST ─── */
function applyRealScores(){
  // Hardcoded scores are the source of truth — apply them, but keep user's manual edits
  Object.entries(REAL_SCORES).forEach(([k,v])=>{
    const ex=state.scores[k];
    if(!ex || ex.autoFilled!==false) state.scores[k]=v;
  });
}
function saveToStorage(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(state));}catch(e){}
}
function autoSave(){
  clearTimeout(saveTimer);
  document.getElementById('saveIndicator').textContent="Saving…";
  saveTimer=setTimeout(()=>{saveToStorage();document.getElementById('saveIndicator').textContent="Saved ✓";},1200);
}
function loadState(){
  try{
    const ls=localStorage.getItem(SAVE_KEY);
    if(ls){state=JSON.parse(ls);}
  }catch(e){}
  applyRealScores();
}
function shareLink(){
  saveToStorage();
  navigator.clipboard.writeText(location.origin+location.pathname).then(()=>{
    const b=document.getElementById("shareBtn");
    b.textContent="✓ Copied!";b.classList.add("success");
    setTimeout(()=>{b.textContent="🔗 Share";b.classList.remove("success");},2200);
  });
}
function switchTab(t){
  document.querySelectorAll(".tab").forEach((el,i)=>el.classList.toggle("active",["groups","bracket"][i]===t));
  document.querySelectorAll(".view").forEach(el=>el.classList.remove("active"));
  document.getElementById("view-"+t).classList.add("active");
  if(t==="bracket") renderBracket();
}

/* ─── LIVE SCORE UPDATE via Claude API (key baked in at build time) ─── */
function showStatus(type,msg){
  const bar=document.getElementById("statusBar");
  bar.className=type;bar.innerHTML=msg;
  clearTimeout(bar._t);
  const delay=type==="ok"?5000:type==="err"?12000:0;
  if(delay) bar._t=setTimeout(()=>{bar.className="";bar.innerHTML="";},delay);
}

/* ─── STANDINGS ─── */
function computeStandings(g){
  const teams=groupTeams(g).map(t=>({name:t.name,flag:t.flag,p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}));
  const idx={};teams.forEach((t,i)=>idx[t.name]=i);
  groupMatchups(g).forEach((m,mi)=>{
    const sc=state.scores[`${g}_${mi}`];
    if(sc&&sc.a!==""&&sc.b!==""&&sc.a!==null&&sc.b!==null){
      const ga=parseInt(sc.a),gb=parseInt(sc.b);
      if(isNaN(ga)||isNaN(gb)) return;
      const ta=teams[idx[m.home]],tb=teams[idx[m.away]];
      ta.p++;tb.p++;ta.gf+=ga;ta.ga+=gb;ta.gd+=ga-gb;tb.gf+=gb;tb.ga+=ga;tb.gd+=gb-ga;
      if(ga>gb){ta.w++;ta.pts+=3;tb.l++;}
      else if(ga<gb){tb.w++;tb.pts+=3;ta.l++;}
      else{ta.d++;ta.pts++;tb.d++;tb.pts++;}
    }
  });
  teams.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.name.localeCompare(b.name));
  return teams;
}

/* ─── BUILD GROUP UI ─── */
function buildGroupsUI(){
  const grid=document.getElementById("groupsGrid");grid.innerHTML="";
  GROUPS.forEach(g=>{
    const standings=computeStandings(g);
    const matchups=groupMatchups(g);
    const played=matchups.filter((_,mi)=>{const sc=state.scores[`${g}_${mi}`];return sc&&sc.a!==""&&sc.b!=="";}).length;
    const card=document.createElement("div");card.className="group-card";
    const hdr=document.createElement("div");hdr.className="group-header";
    hdr.innerHTML=`<span class="group-title">Group ${g}</span><span class="group-meta">${played}/6 played</span>`;
    card.appendChild(hdr);
    // standings table
    const tbl=document.createElement("table");tbl.className="standings";
    tbl.innerHTML=`<thead><tr>
      <th class="left" style="width:22px">#</th><th class="left">Team</th>
      <th title="Played">P</th><th title="Won">W</th><th title="Drawn">D</th><th title="Lost">L</th>
      <th title="Goals For">GF</th><th title="Goals Against">GA</th>
      <th title="Goal Difference">GD</th><th title="Points">Pts</th>
    </tr></thead>`;
    const tbody=document.createElement("tbody");
    standings.forEach((t,i)=>{
      const tr=document.createElement("tr");tr.className=i===0?"row-1":i===1?"row-2":"";
      const pc=i===0?"pos-1":i===1?"pos-2":"pos-o";
      const gds=t.gd>0?"+"+t.gd:String(t.gd);
      const gc=t.gd>0?"gd-pos":t.gd<0?"gd-neg":"";
      tr.innerHTML=`<td class="left"><span class="pos-badge ${pc}">${i+1}</span></td>
        <td class="left"><div class="team-cell"><span class="tf">${t.flag}</span><span class="tn">${t.name}</span></div></td>
        <td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
        <td>${t.gf}</td><td>${t.ga}</td>
        <td class="${gc}">${t.p>0?gds:"–"}</td><td class="pts-cell">${t.pts}</td>`;
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);card.appendChild(tbl);
    // match rows
    const ms=document.createElement("div");ms.className="matches-section";
    const ml=document.createElement("div");ml.className="matches-list";
    matchups.forEach((m,mi)=>{
      const key=`${g}_${mi}`;
      const sc=state.scores[key]||{a:"",b:""};
      const status=matchStatus(m.utcISO);
      const isPlayed=sc.a!==""&&sc.b!=="";
      const ta=getTeam(m.home),tb=getTeam(m.away);
      const [dp,tp]=fmtDate(m.utcISO).split("\n");
      const af=sc.autoFilled?"auto-filled":"";
      const row=document.createElement("div");
      row.className="match-row"+(isPlayed?" played-row":"");
      row.innerHTML=`
        <div class="match-date-col">
          <div class="match-date ${isPlayed?"done":status}">
            <div>${dp}</div>
            <div>${status==="live"?"🔴 LIVE":isPlayed?"FT":tp}</div>
          </div>
        </div>
        <span class="mf">${ta.flag}</span>
        <span class="mt">${m.home}</span>
        <div class="score-box">
          <input class="score-input ${af}" type="number" min="0" max="99" value="${sc.a}" placeholder="–" data-key="${key}" data-side="a">
          <span class="score-sep">:</span>
          <input class="score-input ${af}" type="number" min="0" max="99" value="${sc.b}" placeholder="–" data-key="${key}" data-side="b">
        </div>
        <span class="mt right">${m.away}</span>
        <span class="mf">${tb.flag}</span>
        <span class="match-venue" title="${m.stadium} · ${m.city}">${m.stadium}</span>`;
      ml.appendChild(row);
    });
    ms.appendChild(ml);card.appendChild(ms);
    const leg=document.createElement("div");leg.className="group-legend";
    leg.innerHTML=`<div class="leg-item"><div class="leg-dot" style="background:#378ADD"></div>1st — qualifies</div><div class="leg-item"><div class="leg-dot" style="background:#639922"></div>2nd — qualifies</div>`;
    card.appendChild(leg);
    grid.appendChild(card);
  });
  // Re-parse emoji after DOM update
if(typeof twemoji !== 'undefined') setTimeout(()=>twemoji.parse(document.getElementById('groupsGrid'),{folder:'svg',ext:'.svg'}),50);
document.querySelectorAll(".score-input").forEach(inp=>{
    inp.addEventListener("input",()=>{
      const key=inp.dataset.key,side=inp.dataset.side;
      if(!state.scores[key]) state.scores[key]={a:"",b:""};
      state.scores[key][side]=inp.value===""?"":inp.value;
      delete state.scores[key].autoFilled;
      autoSave();buildGroupsUI();renderBracket();
    });
  });
}

    {utc:"2026-07-15T23:00:00Z", venue:"Mercedes-Benz Stad.",city:"Atlanta, GA"},      // M102: W99 v W100
  ],
  // Final (index 4)
  4: [
    {utc:"2026-07-19T19:00:00Z", venue:"MetLife Stadium",    city:"New York, NJ"},     // M104: Final
  ],
};

function slotLabel(s){
  if(s.p===3) return s.label;
  return(s.p===1?"Winner ":"Runner-up ")+"Group "+s.g;
}
function resolveSlot(s,mi){
  if(s.p===3){
    // Check if a 3rd-place team has been picked for this slot
    const picked=(mi!==undefined)?state.bracket['3rd_'+mi]:null;
    if(picked){
      const t=getTeam(picked);
      return{name:picked,flag:t?t.flag:"",label:picked,sublabel:s.label,group:t?t.group:null,is3rd:true};
    }
    return{name:null,flag:"",label:s.label,sublabel:s.label,group:null,is3rd:true};
  }
  const q=getQualifiers(s.g);
  const name=s.p===1?q.first:q.second;
  if(!name) return{name:null,flag:"",label:slotLabel(s),sublabel:slotLabel(s),group:s.g,is3rd:false};
  const t=getTeam(name);
  return{name,flag:t?t.flag:"",label:name,sublabel:slotLabel(s),group:s.g,is3rd:false};
}
function getR32Seeds(){
  return R32_SCHEDULE.map((r,mi)=>({
    matchNum:r.m,utc:r.utc,venue:r.venue,city:r.city,
    t1:resolveSlot(r.s1,mi),t2:resolveSlot(r.s2,mi),
  }));
}

function fmtMatchDate(utcISO){
  const d=new Date(utcISO);
  const day=d.toLocaleDateString("en-US",{timeZone:selectedTZ,month:"short",day:"numeric",weekday:"short"});
  const time=d.toLocaleTimeString("en-US",{timeZone:selectedTZ,hour:"numeric",minute:"2-digit"});
  return {day, time};
}

function renderBracket(){
  const el=document.getElementById("bracketEl");el.innerHTML="";
  const r32=getR32Seeds();
  const rounds=[r32.map((m,i)=>({t1:m.t1,t2:m.t2,matchNum:m.matchNum,utc:m.utc,venue:m.venue,city:m.city}))];
  for(let r=1;r<5;r++){
    const prev=rounds[r-1],cur=[];
    for(let i=0;i<prev.length;i+=2){
      const w1=state.bracket[`${r-1}_${i}`]||null;
      const w2=state.bracket[`${r-1}_${i+1}`]||null;
      const mk=n=>n?{name:n,flag:teamFlag(n),group:teamGroup(n),label:n}:{name:null,flag:"",label:"TBD"};
      const idx=Math.floor(i/2);
      const ri_data=(LATER_ROUNDS[r]&&LATER_ROUNDS[r][idx])?LATER_ROUNDS[r][idx]:{utc:null,venue:null,city:null};
      cur.push({t1:mk(w1),t2:mk(w2),matchNum:null,utc:ri_data.utc,venue:ri_data.venue,city:ri_data.city});
    }
    rounds.push(cur);
  }
  const champ=state.bracket["4_0"]||null;
  const cd=document.getElementById("champDisplay");
  cd.textContent=champ||"TBD";cd.className=champ?"champ-name":"champ-empty";
  rounds.forEach((matches,ri)=>{
    const col=document.createElement("div");col.className="bracket-round";
    const hdr=document.createElement("div");hdr.className="round-hdr";hdr.textContent=ROUND_NAMES[ri];
    col.appendChild(hdr);
    const mc=document.createElement("div");mc.className="matches-col";
    matches.forEach((match,mi)=>{
      const wrap=document.createElement("div");
      const isLast=(rounds.length-1===ri);
      wrap.className="match-wrapper "+(isLast?"":mi%2===0?"top":"bottom");
      if(isLast) wrap.style.cssText="justify-content:center;align-items:center";
      const box=document.createElement("div");box.className="bmatch";

      // Date/venue header for R32 (and future rounds if data available)
      if(match.utc){
        const {day,time}=fmtMatchDate(match.utc);
        const meta=document.createElement("div");
        meta.style.cssText="font-size:8px;color:var(--text3);padding:3px 7px 2px;border-bottom:1px solid var(--border);line-height:1.4";
        const safeVenue=(match.venue||'').replace(/&/g,'&amp;').replace(/\x3C/g,'&lt;').replace(/'/g,'&#39;');
        const safeCity=(match.city||'').replace(/&/g,'&amp;').replace(/\x3C/g,'&lt;');
        meta.innerHTML=`<span style="font-weight:600;color:var(--text2)">${day}</span> ${time}<br><span style="color:var(--text2)">${safeVenue}</span>${safeCity?`<br><span style="color:var(--text3)">${safeCity}</span>`:""}`;
        box.appendChild(meta);
      }

      [match.t1,match.t2].forEach(team=>{
        const slot=document.createElement("div");
        const win=state.bracket[`${ri}_${mi}`];
        slot.className="bs"+(win&&win===team.name?" bwin":"")+(team.name?" bclick":"");
        const mainLabel = team.name || team.label || "TBD";
        const sub = (ri===0 && team.sublabel && team.sublabel!==mainLabel)
          ? `<span style="font-size:8px;color:var(--text3);display:block;line-height:1.3;margin-top:1px;font-style:normal">${team.sublabel}</span>` : "";
        const repick = (team.is3rd && team.name && ri===0)
          ? `<span class="repick3rd" title="Change 3rd-place pick" style="font-size:10px;color:var(--blue-text);cursor:pointer;padding:0 4px">⌄</span>` : "";
        slot.innerHTML=`<span class="bf">${team.flag||""}</span><span class="bn${team.name?"":" empty"}" style="display:flex;flex-direction:column;gap:0">${mainLabel}${sub}</span>${repick}`;
        if(team.name) slot.onclick=()=>pickWinner(ri,mi,team.name,match);
        else if(team.is3rd && ri===0) slot.onclick=()=>pick3rd(ri,mi,team,match,slot);
        // Re-pick handler for filled 3rd slots
        const rp=slot.querySelector('.repick3rd');
        if(rp) rp.onclick=(e)=>{e.stopPropagation();pick3rd(ri,mi,{label:R32_SCHEDULE[mi].s2.p===3?R32_SCHEDULE[mi].s2.label:R32_SCHEDULE[mi].s1.label},match,slot);};
        box.appendChild(slot);
      });
      wrap.appendChild(box);mc.appendChild(wrap);
    });
    col.appendChild(mc);el.appendChild(col);
  });

  // Champion endpoint column at the end of the tree
  const champCol=document.createElement("div");champCol.className="bracket-round";
  const champHdr=document.createElement("div");champHdr.className="round-hdr";champHdr.textContent="Champion";
  champCol.appendChild(champHdr);
  const champMc=document.createElement("div");champMc.className="matches-col";
  const champWrap=document.createElement("div");champWrap.className="match-wrapper";
  champWrap.style.justifyContent="center";
  const champBox=document.createElement("div");
  champBox.className="bmatch";
  champBox.style.cssText="border:2px solid var(--gold);background:var(--bg)";
  const champTeam=champ?getTeam(champ):null;
  champBox.innerHTML=`
    <div style="text-align:center;padding:8px 7px 4px">
      <div style="font-size:18px">🏆</div>
    </div>
    <div class="bs" style="border-top:1px solid var(--border);justify-content:center;cursor:default">
      <span class="bf">${champTeam?champTeam.flag:""}</span>
      <span class="bn${champ?"":" empty"}" style="font-weight:600;color:${champ?"var(--gold)":"var(--text3)"}">${champ||"TBD"}</span>
    </div>`;
  champWrap.appendChild(champBox);
  champMc.appendChild(champWrap);
  champCol.appendChild(champMc);
  el.appendChild(champCol);
  if(typeof twemoji !== 'undefined') setTimeout(()=>twemoji.parse(el,{folder:'svg',ext:'.svg'}),50);
}
function get3rdPlaceTeam(g){
  // Returns {name, pts, gd, gf, g} of the team currently in 3rd place in group g
  const s=computeStandings(g);
  return s[2]?{name:s[2].name,pts:s[2].pts,gd:s[2].gd,gf:s[2].gf,g:g}:null;
}
function allThirdPlaceRanked(){
  // All 12 third-place teams ranked best-first (FIFA: pts, GD, GF)
  const all=GROUPS.map(g=>get3rdPlaceTeam(g)).filter(t=>t&&t.name);
  all.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  return all;
}
function qualifiedThirdGroups(){
  // The 8 groups whose 3rd-place team is currently in the top 8 (qualified)
  return allThirdPlaceRanked().slice(0,8).map(t=>t.g);
}
// Official FIFA per-slot eligible 3rd-place groups (from R32 regulations)
const SLOT_ELIGIBLE = {
  74:['A','B','C','D','F'],  // Winner E
  77:['C','D','F','G','H'],  // Winner I
  79:['C','E','F','H','I'],  // Winner A
  80:['E','H','I','J','K'],  // Winner L
  81:['B','E','F','I','J'],  // Winner D
  82:['A','E','H','I','J'],  // Winner G
  85:['E','F','G','I','J'],  // Winner B
  87:['D','E','I','J','L'],  // Winner K
};
function pick3rd(round,mi,team,match,slotEl){
  // Determine this slot's match number to apply FIFA restrictions
  const matchNum = R32_SCHEDULE[mi] ? R32_SCHEDULE[mi].m : null;
  const eligibleGroups = (matchNum && SLOT_ELIGIBLE[matchNum]) ? SLOT_ELIGIBLE[matchNum] : GROUPS;
  const qualified = qualifiedThirdGroups();
  const ranked = allThirdPlaceRanked();
  const sel=document.createElement('select');
  sel.style.cssText='width:100%;font-size:11px;padding:3px;border:1px solid var(--blue-text);border-radius:4px;background:var(--bg);color:var(--text)';
  const blank=document.createElement('option');
  blank.value='';blank.textContent='— pick 3rd (FIFA-eligible) —';sel.appendChild(blank);
  // Show only the groups FIFA allows for THIS slot, ranked best-first
  const slotTeams = ranked.filter(t=>eligibleGroups.includes(t.g));
  slotTeams.forEach(t=>{
    const opt=document.createElement('option');
    opt.value=t.name;
    const gds=t.gd>0?'+'+t.gd:t.gd;
    const isQ=qualified.includes(t.g);
    const mark=isQ?'✅':'❌';
    opt.textContent=`${mark} Grp ${t.g}: ${t.name} (${t.pts}pts, ${gds})`;
    if(!isQ) opt.style.color='var(--text3)';
    sel.appendChild(opt);
  });
  // Groups eligible for this slot but not yet decided
  const tbd=eligibleGroups.filter(g=>!get3rdPlaceTeam(g));
  tbd.forEach(g=>{
    const opt=document.createElement('option');
    opt.value='';opt.disabled=true;
    opt.textContent='Grp '+g+': (group not finished)';
    sel.appendChild(opt);
  });
  sel.onchange=()=>{
    if(sel.value){
      state.bracket['3rd_'+mi]=sel.value;
      autoSave();renderBracket();
    }
  };
  sel.onclick=e=>e.stopPropagation();
  if(slotEl){
    slotEl.innerHTML='';
    slotEl.appendChild(sel);
    sel.focus();
  }
}
function pickWinner(round,mi,name,match){
  if(!name) return;
  const other=match.t1.name===name?match.t2:match.t1;
  if(state.bracket[`${round}_${mi}`]===name){delete state.bracket[`${round}_${mi}`];clearDown(round,mi);}
  else{
    state.bracket[`${round}_${mi}`]=name;
    if(other.name&&teamGroup(name)&&teamGroup(name)===teamGroup(other.name))
      setTimeout(()=>alert(`⚠ ${name} and ${other.name} are both from Group ${teamGroup(name)}.`),30);
    clearDown(round,mi);
  }
  autoSave();renderBracket();
}
function clearDown(round,mi){
  const key=`${round+1}_${Math.floor(mi/2)}`;
  if(state.bracket[key]){delete state.bracket[key];clearDown(round+1,Math.floor(mi/2));}
}
function resetBracket(){
  if(!confirm('Reset all knockout bracket picks?\n\nThis clears your simulation only — group-stage scores stay intact.')) return;
  state.bracket={};
  autoSave();
  renderBracket();
}

initTZSelector();
buildGroupsUI();
renderBracket();
document.getElementById('saveIndicator').textContent="All changes saved";

if(typeof twemoji !== 'undefined') setTimeout(()=>twemoji.parse(document.body,{folder:'svg',ext:'.svg'}),100);


</script>
